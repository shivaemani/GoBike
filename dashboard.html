<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Document</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c27;
            --surface3: #242433;
            --accent: #ff5c1a;
            --accent2: #ff8c42;
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;
            --text: #f0f0f8;
            --muted: #8888aa;
            --border: rgba(255, 255, 255, 0.07);
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glow: 0 0 40px rgba(255, 92, 26, 0.15);
            --header-h: 130px;
            --ff-head: 'Syne', sans-serif;
            --ff-body: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--ff-body);
            background: var(--bg);
            color: var(--text);
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        aside {
            width: 300px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: var(--surface);
            color: var(--text);
            border-right: 1px solid var(--border);
            padding: 20px;
            box-sizing: border-box;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
            border-radius: var(--radius);
            transition: 0.2s;
        }

        .logo:hover {
            background: var(--surface3);
        }

        .logo h2,
        .logo h3 {
            margin: 0;
        }

        .logo i {
            color: var(--accent);
            font-size: 24px;
        }

        .logo a {
            text-decoration: none;
            color: var(--text);
        }

        .logo a:hover {
            cursor: pointer;
            color: var(--accent);
        }

        .main {
            flex: 1;
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
            background-color: var(--surface2);
            padding: 0 30px;
            border-bottom: 1px solid var(--border);
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .welcome {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .welcome h2 {
            margin: 0;
            font-family: var(--ff-head);
        }

        .welcome i {
            color: var(--amber);
            font-size: 20px;
        }

        .profile {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid var(--accent);
        }

        .profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div class="container">
        <aside>
            <div class="logo">
                <i class="fa-solid fa-bicycle"></i>
                <a href="dashboard.html">
                    <h2>GoBike</h2>
                </a>
            </div>

            <div class="logo">
                <i class="fa-solid fa-magnifying-glass"></i>
                <a href="findBike.html">
                    <h3>Find Bike</h3>
                </a>
            </div>

            <div class="logo">
                <i class="fa-solid fa-road"></i>
                <a href="myrides.html">
                    <h3>My Rides</h3>
                </a>
            </div>

            <div class="logo">
                <i class="fa-solid fa-wallet"></i>
                <h3>Wallet</h3>
            </div>

            <div class="logo">
                <i class="fa-solid fa-crown"></i>
                <h3>Membership</h3>
            </div>

            <div class="logo">
                <i class="fa-solid fa-gear"></i>
                <h3>Settings</h3>
            </div>

            <div class="logo">
                <i class="fa-solid fa-headset"></i>
                <h3>Support</h3>
            </div>

            <div class="logo">
                <i class="fa-solid fa-right-from-bracket"></i>
                <h3>Logout</h3>
            </div>

        </aside>

        <div class="main">
            <header class="topbar">
                <nav class="nav-top">
                    <div class="welcome">
                        <h2>Hello, Shiva !</h2>
                        <i class="fa-solid fa-hand"></i>
                    </div>

                    <div class="profile">
                        <img src="shiva.png" alt="profile image">
                    </div>
                </nav>
            </header>

            <div class="Home">
                <b>
                    <h1>India's #1 Bike Rental Service</h1>
                </b>

            </div>









        </div>
</body>

</html>
