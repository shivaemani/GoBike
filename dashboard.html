<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Document</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c27;
            --surface3: #242433;
            --accent: #ff5c1a;
            --accent2: #ff8c42;
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;
            --text: #f0f0f8;
            --muted: #8888aa;
            --border: rgba(255, 255, 255, 0.07);
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glow: 0 0 40px rgba(255, 92, 26, 0.15);
            --header-h: 130px;
            --ff-head: 'Syne', sans-serif;
            --ff-body: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--ff-body);
            background: var(--bg);
            color: var(--text);
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        aside {
            width: 300px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: var(--surface);
            color: var(--text);
            border-right: 1px solid var(--border);
            padding: 20px;
            box-sizing: border-box;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
            border-radius: var(--radius);
            transition: 0.2s;
        }

        .logo:hover {
            background: var(--surface3);
        }

        .logo h2,
        .logo h3 {
            margin: 0;
        }

        .logo i {
            color: var(--accent);
            font-size: 24px;
        }

        .logo a {
            text-decoration: none;
            color: var(--text);
        }

        .logo a:hover {
            cursor: pointer;
            color: var(--accent);
        }

        .main {
            flex: 1;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
            background-color: var(--surface2);
            padding: 0 30px;
            border-bottom: 1px solid var(--border);
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .welcome {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .welcome h2 {
            margin: 0;
            font-family: var(--ff-head);
        }

        .welcome i {
            color: var(--amber);
            font-size: 20px;
        }

        .profile {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid var(--accent);
        }

        .profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Profile Menu Styles */
        .profile-container {
            position: relative;
        }

        .profile-menu {
            position: absolute;
            top: 60px;
            right: 0;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 200px;
            padding: 10px 0;
            display: none;
            flex-direction: column;
            box-shadow: var(--shadow);
            z-index: 100;
        }

        .profile-menu.show {
            display: flex;
            animation: fadeInDown 0.2s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-menu-header {
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 5px;
        }

        .profile-menu-header h4 {
            margin: 0 0 5px 0;
            font-family: var(--ff-head);
            color: var(--text);
        }

        .profile-menu-header p {
            margin: 0;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .profile-menu a {
            padding: 10px 20px;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .profile-menu a:hover {
            background: var(--surface3);
            color: var(--accent);
        }

        .profile-menu a i {
            width: 15px;
            text-align: center;
        }

        /* Map Section Styles */
        .map-section {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .map-header h3 {
            margin: 0;
            font-family: var(--ff-head);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
        }

        .map-header p {
            margin: 5px 0 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .map-container {
            width: 100%;
            flex: 1;
            min-height: 0;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            z-index: 1;
        }

        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out,
        .leaflet-control-attribution {
            filter: invert(90%) sepia(40%) hue-rotate(345deg) saturate(300%) brightness(70%) contrast(120%);
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
    <div class="container">
        <aside>
            <div class="logo">
                <i class="fa-solid fa-bicycle"></i>
                <a href="dashboard.html">
                    <h2>GoBike</h2>
                </a>
            </div>

            <div class="logo">
                <i class="fa-solid fa-magnifying-glass"></i>
                <a href="findBike.html">
                    <h3>Find Bike</h3>
                </a>
            </div>

            <div class="logo">
                <i class="fa-solid fa-road"></i>
                <a href="myrides.html">
                    <h3>My Rides</h3>
                </a>
            </div>

            <div class="logo">
                <i class="fa-solid fa-wallet"></i>
                <a href="wallet.html">
                    <h3>Wallet</h3>
                </a>
            </div>

            <div class="logo">
                <i class="fa-solid fa-crown"></i>
                <a href="membership.html">
                    <h3>Membership</h3>
                </a>
            </div>

            <div class="logo">
                <i class="fa-solid fa-gear"></i>
                <a href="settings.html">
                    <h3>Settings</h3>
                </a>
            </div>

            <div class="logo">
                <i class="fa-solid fa-headset"></i>
                <a href="support.html">
                    <h3>Support</h3>
                </a>
            </div>

            <div class="logo">
                <i class="fa-solid fa-right-from-bracket"></i>
                <h3>Logout</h3>
            </div>

        </aside>

        <div class="main">
            <header class="topbar">
                <nav class="nav-top">
                    <div class="welcome">
                        <h2>Hello, Shiva !</h2>
                        <i class="fa-solid fa-hand"></i>
                    </div>

                    <div class="profile-container">
                        <div class="profile" onclick="document.getElementById('profileMenu').classList.toggle('show')">
                            <img src="shiva.png" alt="profile image">
                        </div>
                        <div class="profile-menu" id="profileMenu">
                            <div class="profile-menu-header">
                                <h4>Shiva Emani</h4>
                                <p>shiva@example.com</p>
                            </div>
                            <a href="#" onclick="alert('Opening My Profile...'); return false;"><i
                                    class="fa-solid fa-user"></i> My Profile</a>
                            <a href="#" onclick="alert('Opening Settings...'); return false;"><i
                                    class="fa-solid fa-gear"></i> Settings</a>
                            <a href="#" onclick="alert('Opening Notifications...'); return false;"><i
                                    class="fa-solid fa-bell"></i> Notifications</a>
                            <div style="height: 1px; background: var(--border); margin: 5px 0;"></div>
                            <a href="#" style="color: var(--red);"
                                onclick="if(confirm('Are you sure you want to log out?')) { alert('Logged out successfully.'); } return false;"><i
                                    class="fa-solid fa-right-from-bracket"></i> Logout</a>
                        </div>
                    </div>
                </nav>
            </header>

            <div class="Home" style="padding: 0 30px; margin-top: 20px;">
                <b>
                    <h1 style="margin: 0;">India's #1 Bike Rental Service</h1>
                </b>
            </div>

            <div class="map-section">
                <div class="map-header">
                    <h3><i class="fa-solid fa-location-crosshairs"></i> Nearby Bikes & Live Location</h3>
                    <p>Find available bikes near you instantly</p>
                </div>
                <div id="liveMap" class="map-container"></div>
            </div>









        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const userLat = 12.9716;
            const userLng = 77.5946;

            const map = L.map('liveMap').setView([userLat, userLng], 14);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            const userIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div style='background-color:#22c55e;width:15px;height:15px;border-radius:50%;border:2px solid white;box-shadow:0 0 10px rgba(34,197,94,0.8);'></div>",
                iconSize: [15, 15],
                iconAnchor: [7, 7]
            });
            L.marker([userLat, userLng], { icon: userIcon }).addTo(map).bindPopup("<b>You are here</b><br>Live Location").openPopup();

            const bikeIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div style='background-color:#ff5c1a;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;border:2px solid #fff;box-shadow:0 0 10px rgba(255,92,26,0.6);'><i class='fa-solid fa-motorcycle'></i></div>",
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            const bikeLocations = [
                [userLat + 0.005, userLng + 0.005],
                [userLat - 0.003, userLng + 0.008],
                [userLat + 0.007, userLng - 0.004],
                [userLat - 0.006, userLng - 0.006],
                [userLat + 0.002, userLng - 0.008]
            ];

            bikeLocations.forEach((loc, index) => {
                L.marker(loc, { icon: bikeIcon }).addTo(map).bindPopup(`<b>Available Bike #${index + 1}</b><br>0.${Math.floor(Math.random() * 9) + 1} km away<br><button style='margin-top:5px;padding:4px 8px;background:#ff5c1a;color:#fff;border:none;border-radius:4px;cursor:pointer;'>Book Now</button>`);
            });
        });

        // Close profile menu if clicked outside
        window.addEventListener('click', function (e) {
            const menu = document.getElementById('profileMenu');
            const profileBtn = document.querySelector('.profile');
            if (menu && menu.classList.contains('show') && !menu.contains(e.target) && !profileBtn.contains(e.target)) {
                menu.classList.remove('show');
            }
        });
    </script>
</body>

</html>
