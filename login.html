<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — GoBike</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            font-family: var(--ff-body);
            background: radial-gradient(circle at top right, var(--surface), var(--bg));
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
            top: -50px;
            left: -50px;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(52, 211, 153, 0.08) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(12, 19, 23, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 400px;
            padding: 40px;
            box-shadow: var(--shadow), var(--glow);
            text-align: center;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .logo-container i {
            color: var(--accent);
            font-size: 24px;
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4));
        }

        .logo-container h2 {
            font-family: var(--ff-head);
            font-weight: 800;
            margin: 0;
        }

        h1 {
            font-family: var(--ff-head);
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            color: var(--text);
        }

        form {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-field {
            position: relative;
            margin-bottom: 24px;
        }

        .input-field i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 16px;
            transition: color 0.3s;
        }

        .input-field input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            font-family: var(--ff-body);
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-field input::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        .input-field input:focus {
            border-color: var(--accent2);
            background: var(--surface3);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.15);
        }

        .input-field input:focus + i {
            color: var(--accent);
        }

        button {
            padding: 14px;
            border-radius: 8px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            font-size: 16px;
            font-family: var(--ff-body);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        button:hover {
            background: var(--accent2);
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        .signup-link {
            margin-top: 25px;
            font-size: 14px;
            color: var(--muted);
            text-align: center;
        }

        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: var(--accent2);
            text-decoration: underline;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            margin-top: 20px;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <i class="fa-solid fa-bicycle"></i>
            <h2>GoBike</h2>
        </div>
        <h1>Login</h1>
        <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
            <div class="input-field">
                <input type="text" id="name" placeholder="Username" required>
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="input-field">
                <input type="password" id="password" placeholder="Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <button type="submit">Login</button>
        </form>
        <p class="signup-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
        <a href="Index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect');

        if (redirectUrl) {
            const signupLink = document.querySelector('.signup-link a');
            if (signupLink) {
                signupLink.href = `signup.html?redirect=${encodeURIComponent(redirectUrl)}`;
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const nameInput = document.getElementById('name').value.trim();
            localStorage.setItem('currentUser', nameInput || 'Shiva');
            
            // Set default email/phone if not set by signup
            if (!localStorage.getItem('currentUserEmail')) {
                localStorage.setItem('currentUserEmail', nameInput.toLowerCase().replace(/\s+/g, '') + '@gmail.com');
            }
            if (!localStorage.getItem('currentUserPhone')) {
                localStorage.setItem('currentUserPhone', '9876543210');
            }

            if (redirectUrl) {
                window.location.href = redirectUrl;
            } else {
                window.location.href = 'portal-select.html';
            }
        }
    </script>
</body>
</html>
