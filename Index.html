<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GoBike</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
    font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND */
body{
    background:url("https://png.pngtree.com/thumb_back/fh260/background/20200802/pngtree-bike-trail-siluet-illustration-image_379913.jpg")
    no-repeat center center/cover;
    position:relative;
    color:white;
    overflow:hidden; 
}


body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    z-index:0;
}


header, section{
    position:relative;
    z-index:1;
}


header{
    padding:15px 8%;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo i{
    color:#4ade80;
    font-size:28px;
}

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    color:white;
    text-decoration:none;
}

.nav-links a:hover{
    color:#4ade80;
}

.nav-buttons{
    display:flex;
    gap:12px;
}

.nav-buttons button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.login-btn{
    background:transparent;
    border:1px solid #4ade80;
    color:#4ade80;
}

.signup-btn{
    background:#4ade80;
    color:black;
}


.hero{
    height:60vh;   
    display:flex;
    align-items:center;
    padding:0 8%;
}

.hero-content{
    max-width:600px;
}

.hero h1{
    font-size:clamp(2rem,5vw,4rem);
}

.hero p{
    margin-top:15px;
    color:#e5e5e5;
    font-size:16px;
}

.hero button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#4ade80;
    color:black;
    font-weight:bold;
    cursor: pointer;
}


.features{
    background:white;
    color:black;
    padding:35px 8%;
    border-top-left-radius:0;
    border-top-right-radius:0;
    border-bottom-left-radius:30px;
    border-bottom-right-radius:30px;
}


.feature-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}


.feature-card{
    text-align:center;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
     
}


.feature-card i{
    font-size:30px;
    color:#16a34a;
}

.feature-card h3{
    font-size:16px;
}


@media(max-width:900px){
    .feature-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:600px){
    nav{
        flex-direction:column;
        gap:10px;
    }

    .hero{
        text-align:center;
        justify-content:center;
    }

    .feature-grid{
        grid-template-columns:repeat(1,1fr);
    }
}

</style>
</head>

<body>

<header>
    <nav>

        <div class="logo">
            <i class="fa-solid fa-bicycle"></i>
            <h2>GoBike</h2>
        </div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">How It Works</a>
            <a href="#">Plans</a>
            <a href="#">Support</a>
        </div>

        <div class="nav-buttons">
            <a href="login.html"><button class="login-btn">Login</button></a>
            <a href="signup.html"><button class="signup-btn">Sign Up</button></a>
        </div>

    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Smart Bike Rental For City Rides</h1>
        <p>Find, unlock and ride instantly anywhere in your city.</p>
        <a href="login.html"><button type="button">Start Riding</button></a>
    </div>
</section>

<section class="features">

    <div class="feature-grid">

        <div class="feature-card">
            <i class="fa-solid fa-bolt"></i>
            <h3>Easy Rental</h3>
        </div>

        <div class="feature-card">
            <i class="fa-solid fa-location-dot"></i>
            <h3>Live Tracking</h3>
        </div>

        <div class="feature-card">
            <i class="fa-solid fa-indian-rupee-sign"></i>
            <h3>Affordable</h3>
        </div>

        <div class="feature-card">
            <i class="fa-solid fa-leaf"></i>
            <h3>Eco Friendly</h3>
        </div>

    </div>

</section>

</body>
</html>
