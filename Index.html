<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GoBike</title>

<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
    font-family: var(--ff-body);
}

/* BACKGROUND */
body{
    background:url("https://png.pngtree.com/thumb_back/fh260/background/20200802/pngtree-bike-trail-siluet-illustration-image_379913.jpg")
    no-repeat center center/cover;
    position:relative;
    color: var(--text);
    overflow:hidden; 
}


body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(6, 11, 14, 0.75);
    z-index:0;
}


header, section{
    position:relative;
    z-index:1;
}


header{
    padding: 20px 8%;
    background: rgba(12, 19, 23, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo h2 {
    font-family: var(--ff-head);
    font-weight: 800;
}

.logo i{
    color: var(--accent);
    font-size:28px;
    filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4));
}

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    color: var(--text);
    text-decoration:none;
    font-weight: 500;
    transition: color 0.3s ease;
}

.nav-links a:hover{
    color: var(--accent2);
}

.nav-buttons{
    display:flex;
    gap:12px;
}

.nav-buttons button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    font-family: var(--ff-body);
    font-weight: bold;
    cursor:pointer;
    transition: all 0.3s ease;
}

.login-btn{
    background:transparent;
    border:1px solid var(--accent);
    color: var(--accent);
}

.login-btn:hover{
    background: rgba(16, 185, 129, 0.1);
    box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
}

.signup-btn{
    background: var(--accent);
    color: var(--bg);
}

.signup-btn:hover{
    background: var(--accent2);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
}


.hero{
    height:60vh;   
    display:flex;
    align-items:center;
    padding:0 8%;
}

.hero-content{
    max-width:600px;
}

.hero h1{
    font-family: var(--ff-head);
    font-size:clamp(2rem,5vw,4rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #ffffff, var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p{
    margin-top:15px;
    color: var(--muted);
    font-size: 18px;
    line-height: 1.5;
}

.hero-buttons {
    display: flex;
    gap: 16px;
    margin-top: 25px;
}

.hero-buttons a {
    text-decoration: none;
}

.cta-btn {
    padding: 14px 28px;
    border: none;
    border-radius: 10px;
    font-family: var(--ff-body);
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
}

.primary-btn {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
}

.primary-btn:hover {
    background: var(--accent2);
    transform: translateY(-2px);
    box-shadow: var(--glow);
}

.secondary-btn {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
}

.secondary-btn:hover {
    background: rgba(16, 185, 129, 0.1);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
}


.features{
    background: var(--surface);
    color: var(--text);
    padding: 40px 8%;
    border-top: 1px solid var(--border);
    border-bottom-left-radius:30px;
    border-bottom-right-radius:30px;
    box-shadow: var(--shadow);
}


.feature-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}


.feature-card{
    text-align:center;
    padding:25px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: all 0.3s ease;
}

.feature-card:hover{
    transform: translateY(-5px);
    border-color: var(--border-hover);
    box-shadow: var(--shadow), 0 0 20px rgba(16, 185, 129, 0.05);
}


.feature-card i{
    font-size:30px;
    color: var(--accent);
    filter: drop-shadow(0 0 5px rgba(16, 185, 129, 0.2));
}

.feature-card h3{
    font-family: var(--ff-head);
    font-size:16px;
    font-weight: 700;
}


@media(max-width:900px){
    .feature-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:600px){
    nav{
        flex-direction:column;
        gap:10px;
    }

    .hero{
        text-align:center;
        justify-content:center;
    }

    .feature-grid{
        grid-template-columns:repeat(1,1fr);
    }
}

</style>
</head>

<body>

<header>
    <nav>

        <div class="logo">
            <i class="fa-solid fa-bicycle"></i>
            <h2>GoBike</h2>
        </div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">How It Works</a>
            <a href="#">Plans</a>
            <a href="#">Support</a>
        </div>

        <div class="nav-buttons">
            <a href="login.html"><button class="login-btn">Login</button></a>
            <a href="signup.html"><button class="signup-btn">Sign Up</button></a>
        </div>

    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Smart Bike Rental For City Rides</h1>
        <p>Find, unlock and ride instantly anywhere in your city.</p>
        <div class="hero-buttons">
            <a href="login.html"><button class="cta-btn primary-btn" type="button">Start Riding</button></a>
            <a href="login.html?redirect=listbike.html"><button class="cta-btn secondary-btn" type="button">Rent Your Bike</button></a>
        </div>
    </div>
</section>

<section class="features">

    <div class="feature-grid">

        <div class="feature-card">
            <i class="fa-solid fa-bolt"></i>
            <h3>Easy Rental</h3>
        </div>

        <div class="feature-card">
            <i class="fa-solid fa-location-dot"></i>
            <h3>Live Tracking</h3>
        </div>

        <div class="feature-card">
            <i class="fa-solid fa-indian-rupee-sign"></i>
            <h3>Affordable</h3>
        </div>

        <div class="feature-card">
            <i class="fa-solid fa-leaf"></i>
            <h3>Eco Friendly</h3>
        </div>

    </div>

</section>

</body>
</html>
