<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup Page</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to bottom, black, #1a1a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            background: white;
            color: black;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group{
            display: flex;
            flex-direction: column;
        }

        label{
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        input{
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        input:focus{
            border-color: green;
            box-shadow: 0 0 5px rgba(0,128,0,0.4);
        }

        button{
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: green;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: darkgreen;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Sign Up</h1>

        <form action="login.html" method="get" autocomplete="on">

            <div class="input-group">
                <label for="name">Name</label>
                <input 
                    type="text" 
                    id="name" 
                    placeholder="Enter your name" 
                    required
                >
            </div>

            <div class="input-group">
                <label for="mail">Email</label>
                <input 
                    type="email" 
                    id="mail" 
                    placeholder="example@gmail.com" 
                    required
                >
            </div>

            <div class="input-group">
                <label for="number">Mobile Number</label>
                <input 
                    type="tel" 
                    id="number" 
                    placeholder="+91 1234567890" 
                    required
                >
            </div>

            <div class="input-group">
                <label for="password1">Create Password</label>
                <input 
                    type="password" 
                    id="password1" 
                    placeholder="Enter password" 
                    required
                >
            </div>

            <div class="input-group">
                <label for="password2">Re-enter Password</label>
                <input 
                    type="password" 
                    id="password2" 
                    placeholder="Re-enter password" 
                    required
                >
            </div>

            <button type="submit">Sign Up</button>

        </form>
    </div>

</body>
</html>
