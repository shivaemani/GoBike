<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login — GoBike Partner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            font-family: var(--ff-body);
            background: radial-gradient(circle at top right, var(--surface), var(--bg));
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
            top: -50px;
            left: -50px;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(52, 211, 153, 0.08) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(12, 19, 23, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 400px;
            padding: 40px;
            box-shadow: var(--shadow), var(--glow);
            text-align: center;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .logo-container i {
            color: var(--accent);
            font-size: 24px;
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4));
        }

        .logo-container h2 {
            font-family: var(--ff-head);
            font-weight: 800;
            margin: 0;
        }

        .badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent2);
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            font-family: var(--ff-head);
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--text);
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        form {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-field {
            position: relative;
            margin-bottom: 20px;
        }

        .input-field i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 16px;
            transition: color 0.3s;
        }

        .input-field input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            font-family: var(--ff-body);
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-field input:focus {
            border-color: var(--accent2);
            background: var(--surface3);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.15);
        }

        .input-field input:focus + i {
            color: var(--accent);
        }

        button {
            padding: 14px;
            border-radius: 8px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            font-size: 16px;
            font-family: var(--ff-body);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        button:hover {
            background: var(--accent2);
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        .links-row {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            font-size: 13px;
        }

        .links-row a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .links-row a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <i class="fa-solid fa-bicycle"></i>
            <h2>GoBike</h2>
        </div>
        <div>
            <span class="badge">Partner Portal</span>
        </div>
        <h1 id="bikeNameHeader">Owner Login</h1>
        <div class="subtitle" id="bikeRegSub">Access your dashboard to view bookings and track your money earned.</div>

        <form id="ownerLoginForm" onsubmit="handleOwnerLogin(event)">
            <div class="input-field">
                <input type="text" id="ownerEmail" placeholder="Owner Email or Username" required>
                <i class="fa-solid fa-envelope"></i>
            </div>

            <div class="input-field">
                <input type="password" id="ownerPassword" placeholder="Access Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <button type="submit">Owner Login</button>
        </form>

        <div class="links-row">
            <a href="portal-select.html"><i class="fa-solid fa-arrow-left"></i> Portals</a>
            <a href="listbike.html">List Another Bike</a>
        </div>
    </div>

    <script>
        let currentBikeId = '';

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentBikeId = urlParams.get('bikeId');

            const listedBikes = JSON.parse(localStorage.getItem('listedBikes') || '[]');
            let targetBike = null;

            if (currentBikeId) {
                targetBike = listedBikes.find(b => b.id === currentBikeId);
            } else {
                // If no bikeId in query, check if the current user owns any bike
                const currentUser = localStorage.getItem('currentUser') || 'Shiva';
                targetBike = listedBikes.find(b => b.ownerName === currentUser);
                if (targetBike) {
                    currentBikeId = targetBike.id;
                }
            }

            if (targetBike) {
                document.getElementById('bikeNameHeader').textContent = targetBike.name;
                document.getElementById('bikeRegSub').textContent = `Owner Login Portal for ${targetBike.regNumber}`;
                document.getElementById('ownerEmail').value = targetBike.ownerEmail || '';
                // Autofill password for testing
                document.getElementById('ownerPassword').value = '••••••••';
            }
        });

        function handleOwnerLogin(event) {
            event.preventDefault();
            
            // Allow mock login
            if (currentBikeId) {
                window.location.href = `owner-dashboard.html?bikeId=${currentBikeId}`;
            } else {
                alert('No active bike listing linked. Please list a bike first.');
                window.location.href = 'listbike.html';
            }
        }
    </script>
</body>
</html>
